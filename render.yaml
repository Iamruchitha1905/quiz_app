services:
  # Optimized Full Stack (Pre-built Assets)
  - type: web
    name: quiz-final-fullstack
    runtime: python
    plan: free
    # No npm build required on Render anymore - just Python!
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
