services:
  # Full Stack Web Service (FastAPI + React)
  - type: web
    name: quiz-fullstack
    runtime: python
    plan: free
    # Build frontend first, then backend
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    # Start the FastAPI server which now serves the frontend dist
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_VERSION
        value: 18.0.0
